<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Run Leo">
<meta name="theme-color" content="#0F1923">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Run%20Leo%22%2C%22short_name%22%3A%22Run%20Leo%22%2C%22description%22%3A%22Plan%20antrenament%2010K%20%E2%80%94%2024%20August%202026%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230F1923%22%2C%22theme_color%22%3A%22%230F1923%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520viewBox%253D%25270%25200%2520100%2520100%2527%253E%253Crect%2520width%253D%2527100%2527%2520height%253D%2527100%2527%2520rx%253D%252720%2527%2520fill%253D%2527%25230F1923%2527%252F%253E%253Ctext%2520y%253D%2527.9em%2527%2520font-size%253D%252780%2527%2520x%253D%252710%2527%253E%25F0%259F%258F%2583%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
<title>Run Leo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0F1923; --card:#1A2332; --card2:#212E40; --border:#2A3A50;
  --coral:#FF5F57; --blue:#2D9CDB; --mint:#00C896; --yellow:#FFB800;
  --purple:#9B59B6; --white:#F8F9FA; --text:#E8EDF2; --muted:#6B7F94; --light:#B0BEC5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--navy);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:72px;overflow-x:hidden;}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;transition:color 0.2s;}
.bnav-btn.on{color:var(--coral);}
.bnav-icon{font-size:22px;line-height:1;}

.page{display:none;min-height:calc(100vh - 72px);}
.page.on{display:block;}

.hero{background:linear-gradient(135deg,#1A2B3C 0%,#0F1923 100%);padding:20px 16px 16px;}
.hero-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.hero-title{font-size:28px;font-weight:900;color:var(--white);line-height:1.1;}
.hero-title span{color:var(--coral);}
.hero-sub{font-size:13px;color:var(--muted);margin-top:4px;}

.today-hero{border-radius:20px;padding:20px;margin:16px 16px 12px;position:relative;overflow:hidden;}
.today-hero::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,0.08);border-radius:50%;}
.today-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.today-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.1;}
.today-meta{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:14px;}
.today-btns{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1;}

.btn{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:10px 16px;border-radius:12px;border:none;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:scale(0.96);}
.btn-white{background:#fff;color:var(--coral);}
.btn-ghost{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);}
.btn-mint{background:var(--mint);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-card{background:var(--card2);color:var(--light);border:1px solid var(--border);}
.btn-outline-coral{background:transparent;color:var(--coral);border:2px solid var(--coral);}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:10px;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;justify-content:center;font-size:17px;}

.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px;margin-bottom:12px;}
.metric-card{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;}
.metric-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;margin-bottom:3px;}
.metric-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

.logged-pill{background:rgba(0,200,150,0.1);border:1px solid rgba(0,200,150,0.25);border-radius:12px;padding:10px 14px;margin:0 16px 12px;}
.logged-row{font-family:'DM Mono',monospace;font-size:12px;color:var(--mint);line-height:1.9;}

.pu-card{background:var(--card);border-radius:16px;padding:16px;margin:0 16px 12px;}
.pu-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pu-badge{font-size:32px;font-weight:900;color:var(--yellow);font-family:'DM Mono',monospace;}
.pu-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}

.week-strip{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;margin-bottom:14px;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.wchip{flex-shrink:0;padding:8px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;border:2px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.2s;}
.wchip.on{background:var(--coral);border-color:var(--coral);color:#fff;}
.wchip.done{background:rgba(0,200,150,0.15);border-color:rgba(0,200,150,0.4);color:var(--mint);}

.days-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.day-card{background:var(--card);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;border:2px solid transparent;}
.day-card.today{border-color:var(--coral);background:rgba(255,95,87,0.06);}
.day-card.done{border-color:rgba(0,200,150,0.3);background:rgba(0,200,150,0.04);}
.day-date-block{min-width:40px;text-align:center;}
.day-dow{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.day-num{font-size:26px;font-weight:900;color:var(--white);line-height:1;}
.day-card.today .day-num{color:var(--coral);}
.day-content{flex:1;min-width:0;}
.day-badge-text{font-size:15px;font-weight:800;margin-bottom:2px;}
.day-meta-text{font-size:12px;color:var(--muted);}
.day-run-result{font-size:11px;font-family:'DM Mono',monospace;color:var(--mint);margin-top:2px;}
.day-pu-mini{font-size:11px;color:var(--yellow);margin-top:2px;font-weight:700;}
.day-actions{display:flex;gap:6px;flex-direction:column;align-items:flex-end;}

.stats-hero{background:linear-gradient(135deg,#1E3A5F 0%,#0F1923 100%);border-radius:20px;padding:20px;margin:16px 16px 12px;}
.stats-big-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-big{text-align:center;}
.stat-big-val{font-size:36px;font-weight:900;line-height:1;}
.stat-big-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.stats-title{font-size:13px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}

.prog-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.prog-card{background:var(--card);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.prog-week-label{font-size:13px;font-weight:800;min-width:30px;}
.prog-bar-wrap{flex:1;background:var(--border);border-radius:6px;height:8px;overflow:hidden;}
.prog-bar{height:8px;border-radius:6px;}
.prog-val-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--light);min-width:52px;text-align:right;}

.wk-back{display:flex;align-items:center;gap:8px;padding:16px;cursor:pointer;}
.wk-back span:first-child{font-size:20px;color:var(--coral);}
.wk-back span:last-child{font-size:14px;font-weight:700;color:var(--coral);}
.wk-page-title{font-size:22px;font-weight:900;color:var(--white);padding:0 16px;margin-bottom:16px;line-height:1.2;}
.wk-section{background:var(--card);border-radius:14px;padding:14px;margin:0 16px 10px;}
.wk-sec-label{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.wk-steps{display:flex;flex-direction:column;gap:6px;}
.wk-step{font-size:13px;color:var(--muted);line-height:1.5;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid var(--border);}
.wk-step.hl{color:var(--text);background:rgba(255,255,255,0.05);border-left-color:var(--blue);}
.wk-step.key{color:var(--white);font-weight:700;background:rgba(45,156,219,0.1);border-left-color:var(--blue);}

.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.log-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:20px;max-height:90vh;overflow-y:auto;}
.log-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.log-title{font-size:20px;font-weight:900;color:var(--white);margin-bottom:3px;}
.log-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.log-field{display:flex;flex-direction:column;gap:4px;}
.log-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.log-input{background:var(--navy);border:2px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--white);font-family:'DM Mono',monospace;font-size:15px;outline:none;}
.log-input:focus{border-color:var(--blue);}
.log-btns{display:flex;gap:10px;margin-top:16px;}
.log-btn{flex:1;padding:14px;border:none;border-radius:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;}
.log-save{background:var(--mint);color:#fff;}
.log-cancel{background:var(--border);color:var(--muted);}

.rule-card{background:var(--card);border-radius:14px;padding:14px;margin:0 16px 10px;display:flex;gap:12px;align-items:flex-start;}
.rule-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.rule-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.rule-text{font-size:13px;color:var(--muted);line-height:1.5;}
.rule-text strong{color:var(--white);}
.sec-head{padding:14px 16px 8px;font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}

/* Stats sub-tabs */
.stats-tabs{display:flex;gap:0;margin:0 16px 14px;background:var(--card);border-radius:12px;padding:4px;}
.stats-tab{flex:1;padding:8px 4px;border:none;background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;border-radius:9px;transition:all 0.2s;}
.stats-tab.on{background:var(--coral);color:#fff;}

/* Run history cards */
.run-hist-card{background:var(--card);border-radius:16px;padding:16px;margin:0 16px 10px;border-left:4px solid transparent;}
.run-hist-card.z2{border-left-color:var(--blue);}
.run-hist-card.z3{border-left-color:var(--mint);}
.run-hist-card.z4{border-left-color:var(--yellow);}
.run-hist-card.z5{border-left-color:var(--coral);}
.run-hist-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.run-hist-date{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.run-hist-type{font-size:13px;font-weight:800;color:var(--white);margin-top:2px;}
.run-hist-dist{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--coral);line-height:1;}
.run-hist-dist span{font-size:13px;color:var(--muted);}
.run-hist-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.run-hist-metric{text-align:center;background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 4px;}
.run-hist-mval{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;line-height:1;margin-bottom:2px;}
.run-hist-mlabel{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.run-hist-note{font-size:12px;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.4;}

/* Mini pace chart */
.pace-chart{margin:0 16px 10px;background:var(--card);border-radius:14px;padding:14px;}
.pace-chart-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.pace-chart-bars{display:flex;align-items:flex-end;gap:6px;height:64px;}
.pace-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.pace-bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.3s;}
.pace-bar-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;text-align:center;}

/* Badge improvements */
.run-badge-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}

</style>
</head>
<body>
<nav class="bnav">
  <button class="bnav-btn on" onclick="showPage('today',this)"><span class="bnav-icon">🏃</span>Azi</button>
  <button class="bnav-btn" onclick="showPage('plan',this)"><span class="bnav-icon">📅</span>Plan</button>
  <button class="bnav-btn" onclick="showPage('stats',this)"><span class="bnav-icon">📊</span>Stats</button>
  <button class="bnav-btn" onclick="showPage('rules',this)"><span class="bnav-icon">⚡</span>Reguli</button>
</nav>

<div class="page on" id="page-today">
  <div class="hero">
    <div class="hero-label">Run Leo</div>
    <div class="hero-title" id="hero-date">Buna ziua! <span>💪</span></div>
    <div class="hero-sub" id="hero-sub"></div>
  </div>
  <div id="today-content" style="padding-top:4px;"></div>
</div>

<div class="page" id="page-plan">
  <div class="hero">
    <div class="hero-label">12 Saptamani · 1 Iun – 24 Aug 2026</div>
    <div class="hero-title">Planul <span>Tau</span></div>
  </div>
  <div style="height:12px;"></div>
  <div class="week-strip" id="week-strip"></div>
  <div class="days-list" id="week-days"></div>
</div>

<div class="page" id="page-stats">
  <div class="hero">
    <div class="hero-label">Progres</div>
    <div class="hero-title">Statistici <span>🔥</span></div>
  </div>
  <div class="stats-tabs">
    <button class="stats-tab on" onclick="switchStatsTab('overview',this)">📊 General</button>
    <button class="stats-tab" onclick="switchStatsTab('history',this)">📋 Istoric Runs</button>
    <button class="stats-tab" onclick="switchStatsTab('progress',this)">📈 Progres</button>
  </div>
  <div id="stats-content"></div>
</div>

<div class="page" id="page-rules">
  <div class="hero">
    <div class="hero-label">Non-negociabile</div>
    <div class="hero-title">Reguli <span>⚡</span></div>
  </div>
  <div style="height:8px;"></div>
  <div id="rules-content"></div>
</div>

<div class="page" id="page-workout">
  <div class="wk-back" onclick="goBack()"><span>←</span><span>Inapoi</span></div>
  <div class="wk-page-title" id="wk-page-title"></div>
  <div id="wk-content"></div>
</div>

<div class="log-overlay" id="log-modal" style="display:none;" onclick="if(event.target===this)closeLog()">
  <div class="log-sheet">
    <div class="log-handle"></div>
    <div class="log-title">Logheaza Run</div>
    <div class="log-sub" id="log-sub"></div>
    <div class="log-grid">
      <div class="log-field"><label class="log-label">Pace /km</label><input class="log-input" id="lf-pace" placeholder="6:59"></div>
      <div class="log-field"><label class="log-label">Distanta km</label><input class="log-input" id="lf-dist" placeholder="5.02"></div>
    </div>
    <div class="log-grid">
      <div class="log-field"><label class="log-label">Puls mediu</label><input class="log-input" id="lf-hr" placeholder="147"></div>
      <div class="log-field"><label class="log-label">Puls max</label><input class="log-input" id="lf-hrmax" placeholder="159"></div>
    </div>
    <div class="log-grid">
      <div class="log-field"><label class="log-label">Cadenta spm</label><input class="log-input" id="lf-spm" placeholder="156"></div>
      <div class="log-field"><label class="log-label">Timp total</label><input class="log-input" id="lf-time" placeholder="42:03"></div>
    </div>
    <div class="log-field" style="margin-bottom:0"><label class="log-label">Note</label><input class="log-input" id="lf-note" placeholder="Plat, bine..."></div>
    <div class="log-btns">
      <button class="log-btn log-cancel" onclick="closeLog()">Anuleaza</button>
      <button class="log-btn log-save" onclick="saveLog()">Salveaza ✓</button>
    </div>
  </div>
</div>

<script>
const PUSHUPS = [
  {w:'S1 · 1-7 iun',vol:30,detail:'3 × 10',state:'done'},

const WEEKS = [
  {

    days:[

    ]
  },
  {
    id:'w2', label:'S2', dates:'8 – 14 Iunie', km:'~16km', tag:'now', tagLabel:'← Acum',

let state = {};

// Storage cu fallback complet
var _memStore = {};
var _storage = {
  getItem: function(k) {
    try { var v = localStorage.getItem(k); if(v !== null) return v; } catch(e) {}
    return _memStore[k] !== undefined ? _memStore[k] : null;
  },
  setItem: function(k, v) {
    _memStore[k] = v;
    try { localStorage.setItem(k, v); } catch(e) {}
  }
};

try { state = JSON.parse(_storage.getItem('leo-run-v3') || '{}'); } catch(e) { state = {}; }

PRE_PU_DONE.forEach(function(id) {
  if(!state[id]) state[id]={};
  if(state[id].puDone === undefined) state[id].puDone = true;
});
PRE_RUN_DONE.forEach(function(id) {
  if(!state[id]) state[id]={};
  if(state[id].done === undefined) state[id].done = true;
});

function saveState() {
  try { _storage.setItem('leo-run-v3', JSON.stringify(state)); } catch(e) {}
}

function getTodayId() {
  var n = new Date();
  return 'd-' + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0');
}
var TODAY_ID = getTodayId();
setInterval(function() { var nid=getTodayId(); if(nid!==TODAY_ID){TODAY_ID=nid;renderAll();} }, 60000);

function isPuDone(id) {
  // PRE_PU_DONE = hardcoded done days (always shown as done)
  if(PRE_PU_DONE.has(id)) {
    // User can only UN-mark them explicitly
    return !(state[id] && state[id].puDone === false);
  }
  // Future days: only done if user marked them
  return !!(state[id] && state[id].puDone === true);
}
function isRunDone(id) { return (state[id] && state[id].done) || PRE_RUN_DONE.has(id); }
function getRunData(id) {
  var s = state[id] || {};
  return s.run || (PRE_RUNS[id] && !s.cleared ? PRE_RUNS[id] : null);
}
function findToday() {
  for(var i=0;i<WEEKS.length;i++) for(var j=0;j<WEEKS[i].days.length;j++) if(WEEKS[i].days[j].id===TODAY_ID) return {day:WEEKS[i].days[j],week:WEEKS[i]};
  return null;
}

  document.getElementById('hero-date').innerHTML = days[now.getDay()] + ', <span>' + now.getDate() + ' ' + months[now.getMonth()] + '</span>';
  var wi = WEEKS.findIndex(function(w){return w.days.some(function(d){return d.id===TODAY_ID;});});
  document.getElementById('hero-sub').textContent = 'Saptamana ' + (wi+1) + ' din 12';

  var found = findToday();
  var el = document.getElementById('today-content');
  if(!found) { el.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--muted);font-size:15px;">Plan finalizat! 🎉</div>'; return; }
  var day = found.day, week = found.week;
  var done = isRunDone(day.id);
  var runData = getRunData(day.id);
  var puDone = isPuDone(day.id);

  var html = '';
  var cardBg = day.isRun ? (done ? 'linear-gradient(135deg,#00A676 0%,#00C896 100%)' : 'linear-gradient(135deg,#FF5F57 0%,#FF8A65 100%)') : 'linear-gradient(135deg,#1E3A5F 0%,#2D9CDB 100%)';
  html += '<div class="today-hero" style="background:'+cardBg+'">';
  html += '<div class="today-label">'+week.label+' · '+week.dates+'</div>';
  html += '<div class="today-title">'+day.badge+'</div>';
  if(day.detail && !runData) html += '<div class="today-meta">'+day.detail+'</div>';
  html += '<div class="today-btns">';
  if(day.isRun) {
    if(day.wk) html += '<button class="btn btn-white btn-sm" onclick="openWorkout(\''+day.wk+'\',\'today\')">📋 Detalii</button>';
    if(!done) html += '<button class="btn btn-ghost btn-sm" onclick="markDone(\''+day.id+'\')">✓ Done</button>';
    html += '<button class="btn btn-ghost btn-sm" onclick="openLog(\''+day.id+'\',\''+day.date+'\')">'+(done?'✏️ Edit':'+ Log')+'</button>';
  }
  html += '</div></div>';

  if(runData) {
    html += '<div class="logged-pill">';
    if(runData.pace) html += '<div class="logged-row">⏱ '+runData.pace+'/km · '+(runData.dist||'')+'km · '+(runData.time||'')+'</div>';
    if(runData.hr) html += '<div class="logged-row">💓 '+runData.hr+'↑'+(runData.hrmax||'')+' bpm · 👟 '+(runData.spm||'')+' spm</div>';
    if(runData.note) html += '<div class="logged-row" style="color:var(--muted)">📝 '+runData.note+'</div>';
    html += '</div>';
  }

  var totalKm = 0;
  WEEKS.forEach(function(w){w.days.forEach(function(d){if(d.isRun){var r=getRunData(d.id);if(r&&r.dist) totalKm+=parseFloat(r.dist);}});});
  var doneRuns = 0;

  html += '<div class="metrics">';

    html += '</div>';
  }

  el.innerHTML = html;

    var allDone = w.days.filter(function(d){return d.isRun;}).every(function(d){return isRunDone(d.id);});

  document.getElementById('week-days').innerHTML = week.days.map(function(day){
    var done = isRunDone(day.id);

function getStatsBase() {
  var wi = WEEKS.findIndex(function(w){return w.days.some(function(d){return d.id===TODAY_ID;});});
  var totalKm=0, doneRuns=0, totalPu=0, totalPuAll=0, totalRuns=0, allRuns=[];
  WEEKS.forEach(function(w){w.days.forEach(function(d){
    if(d.isRun){
      totalRuns++;
      var r=getRunData(d.id);
      if(r&&r.dist) totalKm+=parseFloat(r.dist);
      if(isRunDone(d.id)){
        doneRuns++;
        if(r) allRuns.push({id:d.id,date:d.date,badge:d.badge,wk:d.wk,pace:r.pace,hr:r.hr?parseInt(r.hr):null,hrmax:r.hrmax?parseInt(r.hrmax):null,spm:r.spm?parseInt(r.spm):null,dist:r.dist?parseFloat(r.dist):null,time:r.time||null,note:r.note||null});
      }
    }
    if(d.pu&&d.id!=='d-0601'){totalPuAll++;if(isPuDone(d.id))totalPu++;}
  });});
  return {wi:wi,totalKm:totalKm,doneRuns:doneRuns,totalPu:totalPu,totalPuAll:totalPuAll,totalRuns:totalRuns,allRuns:allRuns};
}

function hrZoneInfo(hr) {
  if(!hr) return {z:'—',c:'var(--muted)',cls:''};
  if(hr <= 135) return {z:'Z2',c:'var(--blue)',cls:'z2'};
  if(hr <= 152) return {z:'Z3',c:'var(--mint)',cls:'z3'};
  if(hr <= 165) return {z:'Z4',c:'var(--yellow)',cls:'z4'};
  return {z:'Z5',c:'var(--coral)',cls:'z5'};
}
function spmColor(spm) {
  if(!spm) return 'var(--muted)';
  if(spm >= 170) return 'var(--mint)';
  if(spm >= 160) return 'var(--blue)';
  if(spm >= 150) return 'var(--yellow)';
  return 'var(--coral)';
}
function paceToSec(pace) {
  if(!pace) return 0;
  var p = pace.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]||0);
}

function renderStatsHistory() {
  var b = getStatsBase();
  var html = '';

  if(b.allRuns.length === 0) {
    html += '<div style="padding:40px 16px;text-align:center;color:var(--muted);font-size:15px;">Niciun run logat încă. 🏃</div>';
    document.getElementById('stats-content').innerHTML = html;
    return;
  }

  // Pace chart vizual
  var runs = b.allRuns.filter(function(r){return r.pace;});
  if(runs.length >= 2) {
    var paces = runs.map(function(r){return paceToSec(r.pace);});
    var maxPace = Math.max.apply(null, paces);
    var minPace = Math.min.apply(null, paces);
    var range = maxPace - minPace || 1;
    html += '<div class="pace-chart">';
    html += '<div class="pace-chart-title">📉 Evoluție Pace (mai mic = mai rapid)</div>';
    html += '<div class="pace-chart-bars">';
    runs.forEach(function(r,i) {
      var sec = paceToSec(r.pace);
      // Invert: fastest = tallest bar
      var heightPct = Math.round(((maxPace - sec) / range) * 80) + 20;
      var barCol = i === runs.length-1 ? 'var(--coral)' : 'var(--border)';
      if(sec === minPace) barCol = 'var(--mint)';
      html += '<div class="pace-bar-wrap">';
      html += '<div style="flex:1;display:flex;align-items:flex-end;">';
      html += '<div class="pace-bar" style="height:'+heightPct+'%;background:'+barCol+';width:100%;border-radius:4px 4px 0 0;"></div>';
      html += '</div>';
      html += '<div class="pace-bar-label" style="color:'+(i===runs.length-1?'var(--coral)':'var(--muted)')+'">'+r.pace+'</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;margin-top:4px;">';
    html += '<span style="font-size:9px;color:var(--muted)">'+runs[0].date+'</span>';

    html += '</div>';
    html += '</div>';

  // Cards pentru fiecare run (invers cronologic)
  html += '<div class="sec-head">Toate Runurile ('+ b.allRuns.length +')</div>';
  var reversed = b.allRuns.slice().reverse();
  reversed.forEach(function(r, i) {
    var zone = hrZoneInfo(r.hr);
    var zoneMax = hrZoneInfo(r.hrmax);
    var sc = spmColor(r.spm);

    html += '<div class="run-hist-header">';

    html += '</div></div>';
    // Metrics grid
    html += '<div class="run-hist-metrics">';
    // Pace
    html += '<div class="run-hist-metric"><div class="run-hist-mval" style="color:var(--coral)">'+(r.pace||'—')+'</div><div class="run-hist-mlabel">pace/km</div></div>';

    // SPM
    html += '<div class="run-hist-metric"><div class="run-hist-mval" style="color:'+sc+'">'+(r.spm||'—')+'</div><div class="run-hist-mlabel">cadență spm</div></div>';
    // Dist bar visual (target 10km = 100%)
    var distPct = r.dist ? Math.min(Math.round((r.dist/10)*100), 100) : 0;
    html += '<div class="run-hist-metric" style="grid-column:span 2;">';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<div style="flex:1;background:var(--border);border-radius:4px;height:6px;"><div style="width:'+distPct+'%;height:6px;border-radius:4px;background:var(--coral);"></div></div>';

    html += '</div><div class="run-hist-mlabel" style="margin-top:4px;">distanță</div>';
    html += '</div>';
    html += '</div>';
    // Note
    if(r.note) html += '<div class="run-hist-note">📝 '+r.note+'</div>';
    html += '</div>';
  });

  // Comparison stats footer
  if(b.allRuns.length >= 2) {

    var withSpm = b.allRuns.filter(function(r){return r.spm;});
    var bestPaceRun = withPace.reduce(function(a,b){return paceToSec(a.pace)<paceToSec(b.pace)?a:b;}, withPace[0]);
    var bestSpmRun = withSpm.reduce(function(a,b){return a.spm>b.spm?a:b;}, withSpm[0]);
    var avgHr = Math.round(b.allRuns.filter(function(r){return r.hr;}).reduce(function(s,r){return s+r.hr;},0) / b.allRuns.filter(function(r){return r.hr;}).length);

    if(bestSpmRun) html += '<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:var(--muted);">👟 Cel mai bun SPM</span><span style="font-family:DM Mono,monospace;font-size:15px;color:var(--blue);">'+bestSpmRun.spm+' spm <span style="font-size:11px;color:var(--muted)">'+bestSpmRun.date+'</span></span></div>';
    if(avgHr) html += '<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:var(--muted);">💓 HR mediu overall</span><span style="font-family:DM Mono,monospace;font-size:15px;color:var(--yellow);">'+avgHr+' bpm</span></div>';
    html += '</div></div>';
  }

  html += '<div style="height:16px;"></div>';
  document.getElementById('stats-content').innerHTML = html;
}

function renderStatsProgress() {

    var wkCol = isCur?'var(--blue)':(isPast&&doneRuns.length===runs.length&&runs.length>0?'var(--mint)':'var(--white)');

    html += '<div style="background:var(--card);border-radius:10px;padding:8px 10px;">';

    html += '</div>';

    html += '<div style="display:flex;gap:4px;">';

      var isRun = d.isRun;
      var done = isRun && isRunDone(d.id);
      var isToday = d.id === TODAY_ID;
      var runData = isRun && done ? getRunData(d.id) : null;
      var dotBg, dotBorder, dotColor;
      if(!isRun) {
        dotBg='var(--navy)'; dotBorder='var(--border)'; dotColor='var(--muted)';
      } else if(done) {
        dotBg='var(--mint)'; dotBorder='var(--mint)'; dotColor='#fff';
      } else if(isToday) {
        dotBg='transparent'; dotBorder='var(--coral)'; dotColor='var(--coral)';
      } else {
        dotBg='transparent'; dotBorder='var(--border)'; dotColor='var(--muted)';
      }
      var dayLabel = d.day.charAt(0); // L M M J V S D
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">';
      // circle
      html += '<div style="width:28px;height:28px;border-radius:50%;background:'+dotBg+';border:2px solid '+dotBorder+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:'+dotColor+';">'+(isRun?(done?'✓':'🏃'):'·')+'</div>';
      // date number
      html += '<div style="font-size:9px;color:'+(isToday?'var(--coral)':'var(--muted)')+';font-weight:700;">'+d.date.split(' ')[0]+'</div>';
      // km if done
      if(runData&&runData.dist) html += '<div style="font-family:DM Mono,monospace;font-size:8px;color:var(--mint);">'+runData.dist+'k</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div style="padding:0 16px;display:flex;flex-direction:column;gap:6px;margin-bottom:6px;">';
  WEEKS.forEach(function(w, i) {
    var isPast = i < b.wi, isCur = i === b.wi;
    var puDays = w.days.filter(function(d){return d.pu && d.id!=='d-0601';});
    var donePu = puDays.filter(function(d){return isPuDone(d.id);});
    // Get reps/sets from first day that has pu (all same in a week)
    var puSample = w.days.find(function(d){return d.pu;});
    var puDetail = puSample ? puSample.pu : '';
    // Parse: "3×10" → sets=3, reps=10, total=30
    var sets=0, reps=0, totalReps=0;
    var match = puDetail.match(/(\d+)×(\d+)/);
    if(match){sets=parseInt(match[1]);reps=parseInt(match[2]);totalReps=sets*reps;}
    var totalWeekReps = donePu.length * totalReps;
    var wkCol = isCur?'var(--yellow)':(isPast&&donePu.length===puDays.length&&puDays.length>0?'var(--mint)':'var(--white)');

    html += '<div style="background:var(--card);border-radius:10px;padding:8px 10px;">';
    // header
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">';
    html += '<div>';
    html += '<span style="font-size:12px;font-weight:800;color:'+wkCol+'">'+w.label+'</span>';
    if(puDetail) html += ' <span style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);">'+puDetail+'</span>';
    html += '</div>';
    html += '<div style="text-align:right;">';
    html += '<span style="font-family:DM Mono,monospace;font-size:11px;color:'+(totalWeekReps>0?'var(--yellow)':'var(--muted)')+';">'+(totalWeekReps>0?totalWeekReps+' rep':'—')+'</span>';
    html += ' <span style="font-size:10px;color:var(--muted);">'+donePu.length+'/'+puDays.length+' zile</span>';
    html += '</div></div>';
    // day dots
    html += '<div style="display:flex;gap:4px;">';
    w.days.forEach(function(d) {
      var hasPu = !!(d.pu && d.id!=='d-0601');
      var done = hasPu && isPuDone(d.id);
      var isToday = d.id === TODAY_ID;
      var dotBg, dotBorder, dotColor;
      if(!hasPu) {
        dotBg='var(--navy)'; dotBorder='var(--border)'; dotColor='var(--muted)';
      } else if(done) {
        dotBg='var(--yellow)'; dotBorder='var(--yellow)'; dotColor='#000';
      } else if(isToday) {
        dotBg='transparent'; dotBorder='var(--yellow)'; dotColor='var(--yellow)';
      } else {
        dotBg='transparent'; dotBorder='var(--border)'; dotColor='var(--muted)';
      }
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">';
      html += '<div style="width:28px;height:28px;border-radius:50%;background:'+dotBg+';border:2px solid '+dotBorder+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:'+dotColor+';">'+(hasPu?(done?'✓':'○'):'·')+'</div>';
      html += '<div style="font-size:9px;color:'+(isToday?'var(--coral)':'var(--muted)')+';font-weight:700;">'+d.date.split(' ')[0]+'</div>';
      if(hasPu&&done&&reps) html += '<div style="font-family:DM Mono,monospace;font-size:8px;color:var(--yellow);">'+totalReps+'</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div><div style="height:16px;"></div>';
  document.getElementById('stats-content').innerHTML = html;
}

}
